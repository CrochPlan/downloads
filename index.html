<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atelier — téléchargements</title>
  <meta name="description" content="Point de téléchargement des applications de l'organisation." />
  <link rel="icon" href="data:," />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./assets/css/style.css" />
</head>
<body>

  <header class="hero">
    <div class="hero__inner">
      <p class="eyebrow" id="hero-stats">chargement du catalogue…</p>
      <h1 class="hero__title" id="org-name">Atelier</h1>
      <p class="hero__tagline" id="org-tagline">Des outils, construits et livrés à la main.</p>
      <a class="hero__link" id="org-github" href="#" target="_blank" rel="noopener">
        Voir l'organisation sur GitHub ↗
      </a>
    </div>
  </header>

  <main class="catalog" id="catalog" aria-live="polite">
    <p class="catalog__empty">Chargement des applications…</p>
  </main>

  <footer class="site-footer">
    <p>Binaires hébergés directement dans ce dépôt, sous <code>/releases</code>.</p>
    <p class="site-footer__muted">Aucun tracker, aucune télémétrie. Ce que vous voyez est ce que vous téléchargez.</p>
  </footer>

  <script src="./assets/js/main.js" defer></script>
</body>
</html>
